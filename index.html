<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Appreneur Challenge — Build Your First App in 5 Days</title>
    <meta name="title" content="Appreneur Challenge — Build Your First App in 5 Days" />
    <meta name="description" content="Join 500+ entrepreneurs building real apps without code. Free 5-day challenge teaches you to go from idea to live app." />
    <meta name="author" content="AI For Beginners" />
    <meta name="keywords" content="no-code, app development, entrepreneur, build app, Lovable, AI app builder, 5-day challenge" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://appreneur.ai/" />
    <meta property="og:title" content="Appreneur Challenge — Build Your First App in 5 Days" />
    <meta property="og:description" content="Join 500+ entrepreneurs building real apps without code. Free 5-day challenge teaches you to go from idea to live app." />
    <meta property="og:image" content="https://appreneur.ai/og-image.png" />
    <meta property="og:site_name" content="Appreneur Challenge" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://appreneur.ai/" />
    <meta name="twitter:title" content="Appreneur Challenge — Build Your First App in 5 Days" />
    <meta name="twitter:description" content="Join 500+ entrepreneurs building real apps without code. Free 5-day challenge teaches you to go from idea to live app." />
    <meta name="twitter:image" content="https://appreneur.ai/og-image.png" />
    <meta name="twitter:site" content="@AIForBeginners" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Analytics IDs — Replace with your real IDs -->
    <!-- Replace G-XXXXXXXXXX with your real GA4 Measurement ID -->
    <meta name="ga4-id" content="G-XXXXXXXXXX" />
    <!-- Replace XXXXXXXXXXXXXXXX with your real Facebook Pixel ID -->
    <meta name="fb-pixel-id" content="XXXXXXXXXXXXXXXX" />

    <!-- Google Analytics 4 (GA4) -->
    <script>
      (function() {
        var ga4Id = document.querySelector('meta[name="ga4-id"]')?.getAttribute('content');
        if (ga4Id && ga4Id !== 'G-XXXXXXXXXX') {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + ga4Id;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', ga4Id);
        }
      })();
    </script>
    
    <!-- Facebook Pixel -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      (function() {
        var fbId = document.querySelector('meta[name="fb-pixel-id"]')?.getAttribute('content');
        if (fbId && fbId !== 'XXXXXXXXXXXXXXXX') {
          fbq('init', fbId);
          fbq('track', 'PageView');
        }
      })();
    </script>
  </head>

  <body>
    <!-- Facebook Pixel noscript fallback -->
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=XXXXXXXXXXXXXXXX&ev=PageView&noscript=1" alt="" />
    </noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
